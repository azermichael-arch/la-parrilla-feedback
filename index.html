<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>La Parrilla Smart Display</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header id="header">

    <div id="logo">
        LA PARRILLA
    </div>

</header>


<main>

    <!-- PROMOTION SCREEN -->

    <section id="promotionScreen" class="screen">

        <img id="promotionImage" alt="La Parrilla promotion">

        <div id="promotionTitle">
            Promotion Title
        </div>

        <div id="promotionPrice">
            220 EGP
        </div>

    </section>


    <!-- FEEDBACK SCREEN -->

    <section id="feedbackScreen" class="screen">

        <h1>
            How was your experience today?
        </h1>

        <p class="screenMessage">
            Tap one face to share your feedback
        </p>

        <div id="emojiContainer"
     style="display:flex;
            flex-direction:row;
            justify-content:center;
            align-items:flex-start;
            gap:60px;
            width:100%;
            margin-top:50px;
            flex-wrap:nowrap;">

            <button class="emoji"
                    type="button"
                    onclick="rate('Happy')">

                😊

                <span>Loved It</span>

            </button>


            <button class="emoji"
                    type="button"
                    onclick="rate('Neutral')">

                😐

                <span>It Was OK</span>

            </button>


            <button class="emoji"
                    type="button"
                    onclick="rate('Sad')">

                ☹️

                <span>Needs Improvement</span>

            </button>

        </div>

    </section>


    <!-- REASON SCREEN -->

    <section id="reasonScreen" class="screen">

        <h1 id="reasonTitle">
            What can we improve?
        </h1>

       <div id="reasonButtons">

    <button onclick="sendReason(this.innerText)"></button>

    <button onclick="sendReason(this.innerText)"></button>

    <button onclick="sendReason(this.innerText)"></button>

    <button onclick="sendReason(this.innerText)"></button>

    <button onclick="sendReason(this.innerText)"></button>

    <button onclick="sendReason(this.innerText)"></button>

</div>

    </section>


    <!-- VIDEO SCREEN -->

    <section id="videoScreen" class="screen">

        <video id="promoVideo"
               autoplay
               muted
               loop
               playsinline>
        </video>

    </section>


    <!-- MENU SCREEN -->

    <section id="menuScreen" class="screen">

        <img id="menuImage" alt="La Parrilla menu">

    </section>


    <!-- THANK-YOU SCREEN -->

    <section id="thankYouScreen" class="screen">

        <div id="thankYouIcon">
            ❤️
        </div>

        <h1>
            Thank You!
        </h1>

        <p>
            We appreciate your feedback.
        </p>

    </section>

</main>


<script src="config.js"></script>

<script src="script.js"></script>

</body>

</html>
