<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>La Parrilla Smart Display</title>

    <link
        rel="stylesheet"
        href="style.css?v=4"
    >

</head>

<body>

    <!-- ========================================= -->
    <!-- HEADER -->
    <!-- ========================================= -->

    <header id="header">

        <div id="logo">
            LA PARRILLA
        </div>

    </header>


    <!-- ========================================= -->
    <!-- MAIN APPLICATION -->
    <!-- ========================================= -->

    <main>


        <!-- ===================================== -->
        <!-- PROMOTION SCREEN -->
        <!-- ===================================== -->

        <section
            id="promotionScreen"
            class="screen"
        >

            <img
                id="promotionImage"
                src=""
                alt="La Parrilla promotion"
            >

            <div id="promotionTitle">
                Promotion Title
            </div>

            <div id="promotionPrice">
                220 EGP
            </div>

        </section>


        <!-- ===================================== -->
        <!-- FEEDBACK SCREEN -->
        <!-- ===================================== -->

        <section
            id="feedbackScreen"
            class="screen"
        >

            <h1>
                How was your experience today?
            </h1>

            <p class="screenMessage">
                Tap one face to share your feedback
            </p>

            <div
                id="emojiContainer"
                style="
                    display:flex;
                    flex-direction:row;
                    justify-content:center;
                    align-items:flex-start;
                    gap:60px;
                    width:100%;
                    margin-top:50px;
                    flex-wrap:nowrap;
                "
            >

                <button
                    class="emoji"
                    type="button"
                    onclick="rate('Happy')"
                >

                    😊

                    <span>
                        Loved It
                    </span>

                </button>


                <button
                    class="emoji"
                    type="button"
                    onclick="rate('Neutral')"
                >

                    😐

                    <span>
                        It Was OK
                    </span>

                </button>


                <button
                    class="emoji"
                    type="button"
                    onclick="rate('Sad')"
                >

                    ☹️

                    <span>
                        Needs Improvement
                    </span>

                </button>

            </div>

        </section>


        <!-- ===================================== -->
        <!-- REASON SCREEN -->
        <!-- ===================================== -->

        <section
            id="reasonScreen"
            class="screen"
        >

            <h1 id="reasonTitle">
                What can we improve?
            </h1>

            <div id="reasonButtons">

                <button
                    type="button"
                    onclick="sendReason(this.innerText)"
                >
                </button>

                <button
                    type="button"
                    onclick="sendReason(this.innerText)"
                >
                </button>

                <button
                    type="button"
                    onclick="sendReason(this.innerText)"
                >
                </button>

                <button
                    type="button"
                    onclick="sendReason(this.innerText)"
                >
                </button>

                <button
                    type="button"
                    onclick="sendReason(this.innerText)"
                >
                </button>

                <button
                    type="button"
                    onclick="sendReason(this.innerText)"
                >
                </button>

            </div>

        </section>


        <!-- ===================================== -->
        <!-- VIDEO SCREEN -->
        <!-- ===================================== -->

        <section
            id="videoScreen"
            class="screen"
        >

            <video
                id="promoVideo"
                autoplay
                muted
                loop
                playsinline
            >

                Your browser does not support video playback.

            </video>

        </section>


        <!-- ===================================== -->
        <!-- MENU SCREEN -->
        <!-- ===================================== -->

        <section
            id="menuScreen"
            class="screen"
        >

            <img
                id="menuImage"
                src=""
                alt="La Parrilla menu"
            >

        </section>


        <!-- ===================================== -->
        <!-- THANK-YOU SCREEN -->
        <!-- ===================================== -->

        <section
            id="thankYouScreen"
            class="screen"
        >

            <div id="thankYouIcon">
                ❤️
            </div>

            <h1>
                Thank You!
            </h1>

            <p>
                We appreciate your feedback.
            </p>

        </section>

    </main>


    <!-- ========================================= -->
    <!-- JAVASCRIPT FILES -->
    <!-- ========================================= -->

    <script src="config.js?v=4"></script>

    <script src="script.js?v=4"></script>

</body>

</html>
